<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nigel Prentice</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #0d0d0d;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    overflow: hidden;
    color: #fff;
  }

  /* ── Slideshow container ── */
  .deck {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  /* ── Individual slides ── */
  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.8s ease;
    pointer-events: none;
  }
  .slide.active {
    opacity: 1;
    pointer-events: auto;
  }

  /* ── Full-bleed image helper ── */
  .slide-img {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  /* ── Overlays ── */
  .overlay-subtle { position: absolute; inset: 0; background: rgba(0,0,0,0.22); }

  /* ── Content layers ── */
  .slide-content {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ─────────────────────────────────────────────
     SLIDE 1 — Hero
  ───────────────────────────────────────────── */
  #s1 .slide-img {
    background-image: url('images/slide_bg.jpg');
    background-position: 35% center;
  }
  #s1 .hero-text {
    position: absolute;
    right: 8%;
    top: 50%;
    transform: translateY(-50%);
    text-align: right;
  }
  #s1 .hero-text h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(2.8rem, 5vw, 5rem);
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1.1;
    color: #fff;
  }
  #s1 .hero-text p {
    margin-top: 1.2rem;
    font-size: 0.8rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
  }

  /* ─────────────────────────────────────────────
     SLIDE 2 — Stats
  ───────────────────────────────────────────── */
  #s2 .slide-img {
    background-image: url('images/slide_bg.jpg');
    background-position: 35% center;
    filter: brightness(0.55);
  }
  #s2 .stats {
    display: flex;
    gap: clamp(2rem, 6vw, 6rem);
    align-items: flex-start;
  }
  #s2 .stat { text-align: center; }
  #s2 .stat .num {
    font-family: Georgia, serif;
    font-size: clamp(3rem, 6vw, 6rem);
    font-weight: 400;
    letter-spacing: -0.03em;
    line-height: 1;
    color: #fff;
  }
  #s2 .stat .label {
    margin-top: 0.8rem;
    font-size: clamp(0.62rem, 1.1vw, 0.75rem);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    line-height: 1.6;
  }
  #s2 .stat-divider {
    width: 1px;
    height: 60px;
    background: rgba(255,255,255,0.18);
    align-self: center;
  }


  /* ─────────────────────────────────────────────
     Navigation arrows
  ───────────────────────────────────────────── */
  .nav-btn {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    z-index: 100;
    background: none;
    border: none;
    cursor: pointer;
    padding: 1.8rem 1.4rem;
    opacity: 0.2;
    transition: opacity 0.35s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-btn:hover { opacity: 0.65; }
  .nav-btn.hidden { pointer-events: none; opacity: 0 !important; }
  #btn-prev { left: 0; }
  #btn-next { right: 0; }
  .nav-btn svg {
    width: 26px; height: 26px;
    stroke: #fff;
    stroke-width: 1.5;
    fill: none;
    display: block;
  }

  /* ── Slide dots ── */
  .dots {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 7px;
    z-index: 100;
  }
  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    cursor: pointer;
    border: none;
    padding: 0;
    transition: background 0.35s ease, transform 0.35s ease;
  }
  .dot.active {
    background: rgba(255,255,255,0.8);
    transform: scale(1.4);
  }

  /* ── Slide counter ── */
  .counter {
    position: fixed;
    top: 1.5rem;
    right: 2rem;
    font-size: 0.62rem;
    letter-spacing: 0.22em;
    color: rgba(255,255,255,0.25);
    z-index: 100;
    font-variant-numeric: tabular-nums;
    user-select: none;
  }
</style>
</head>
<body>

<div class="deck" id="deck">

  <!-- SLIDE 1 — Hero -->
  <div class="slide active" id="s1">
    <div class="slide-img"></div>
    <div class="overlay-subtle"></div>
    <div class="hero-text">
      <h1>Hi,<br>I'm Nigel.</h1>
      <p>nigel@nigelprentice.com</p>
    </div>
  </div>

  <!-- SLIDE 2 — Stats -->
  <div class="slide" id="s2">
    <div class="slide-img"></div>
    <div class="slide-content">
      <div class="stats">
        <div class="stat">
          <div class="num">$400m</div>
          <div class="label">Revenue<br>Influence</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <div class="num">100s</div>
          <div class="label">Products<br>Shipped</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <div class="num">25+</div>
          <div class="label">Years Digital<br>Leadership</div>
        </div>
      </div>
    </div>
  </div>


</div><!-- /deck -->

<!-- Navigation -->
<button class="nav-btn hidden" id="btn-prev" aria-label="Previous slide">
  <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
</button>
<button class="nav-btn" id="btn-next" aria-label="Next slide">
  <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
</button>

<div class="dots" id="dots"></div>
<div class="counter" id="counter">1 / 2</div>

<script>
  const slides  = Array.from(document.querySelectorAll('.slide'));
  const deck    = document.getElementById('deck');
  const dotsEl  = document.getElementById('dots');
  const counter = document.getElementById('counter');
  const btnPrev = document.getElementById('btn-prev');
  const btnNext = document.getElementById('btn-next');
  const TOTAL   = slides.length;
  const LIGHT   = new Set(); // no light slides remaining

  let current = 0;

  // Build dots
  slides.forEach((_, i) => {
    const d = document.createElement('button');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.setAttribute('aria-label', `Go to slide ${i + 1}`);
    d.addEventListener('click', () => goTo(i));
    dotsEl.appendChild(d);
  });

  function updateUI() {
    slides.forEach((s, i) => s.classList.toggle('active', i === current));
    document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
    counter.textContent = `${current + 1} / ${TOTAL}`;
    btnPrev.classList.toggle('hidden', current === 0);
    btnNext.classList.toggle('hidden', current === TOTAL - 1);
  }

  function goTo(n) {
    current = Math.max(0, Math.min(TOTAL - 1, n));
    updateUI();
  }

  btnPrev.addEventListener('click', () => goTo(current - 1));
  btnNext.addEventListener('click', () => goTo(current + 1));

  // Keyboard navigation
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(current + 1);
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goTo(current - 1);
  });

  // Touch / swipe
  let touchX = null;
  document.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive: true });
  document.addEventListener('touchend',   e => {
    if (touchX === null) return;
    const dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) > 50) goTo(current + (dx < 0 ? 1 : -1));
    touchX = null;
  }, { passive: true });

  updateUI();
</script>
</body>
</html>
